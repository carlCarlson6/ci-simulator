<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyberpunk Terminal Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <script>
      (function () {
        const themes = {
          cyberpunk: { bg: '#000000', green: '#00ff00', 'green-dim': '#006600', 'green-dark': '#00aa00', red: '#ff0044', blue: '#0099ff', yellow: '#ffcc00', cyan: '#00ffff', magenta: '#ff00ff' },
          amber: { bg: '#1a0f00', green: '#ffb000', 'green-dim': '#664400', 'green-dark': '#aa7700', red: '#ff3300', blue: '#ffaa33', yellow: '#ffcc66', cyan: '#ffdd88', magenta: '#ff8800' },
          phosphor: { bg: '#0a0a0a', green: '#c0c0c0', 'green-dim': '#505050', 'green-dark': '#808080', red: '#ff5555', blue: '#87ceeb', yellow: '#e0e0e0', cyan: '#aaffff', magenta: '#ff99ff' },
          commodore: { bg: '#352879', green: '#6c5eb5', 'green-dim': '#2a1f5e', 'green-dark': '#4a3a8a', red: '#ff4444', blue: '#8aa4ff', yellow: '#bbbbff', cyan: '#aaddff', magenta: '#cc88ff' },
          solarized: { bg: '#002b36', green: '#839496', 'green-dim': '#586e75', 'green-dark': '#657b83', red: '#dc322f', blue: '#268bd2', yellow: '#b58900', cyan: '#2aa198', magenta: '#d33682' },
        };
        const saved = localStorage.getItem('ci-simulator:theme');
        const theme = themes[saved];
        if (theme) {
          const root = document.documentElement;
          root.style.setProperty('--color-terminal-bg', theme.bg);
          root.style.setProperty('--color-terminal-green', theme.green);
          root.style.setProperty('--color-terminal-green-dim', theme['green-dim']);
          root.style.setProperty('--color-terminal-green-dark', theme['green-dark']);
          root.style.setProperty('--color-terminal-red', theme.red);
          root.style.setProperty('--color-terminal-blue', theme.blue);
          root.style.setProperty('--color-terminal-yellow', theme.yellow);
          root.style.setProperty('--color-terminal-cyan', theme.cyan);
          root.style.setProperty('--color-terminal-magenta', theme.magenta);
        }
      })();
    </script>
  </head>
  <body class="bg-black text-terminal-green">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
